<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>🍰 宝宝小食堂 · 完整版</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="宝宝小食堂">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23ffd1e0'/><text y='.9em' font-size='70' text-anchor='middle' x='50'>🍰</text></svg>">
  <link rel="manifest" id="pwaManifest">
  <meta name="theme-color" content="#fff5f9">
  <style>
    :root{--bg:#fff5f9;--card:#fff;--pink:#ffd1e0;--rose:#f9a8c4;--shadow:0 6px 22px rgba(210,180,190,0.25);--radius:26px;--font:'PingFang SC','Microsoft YaHei',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:linear-gradient(145deg,#ffecf2,#fde4ee 40%,#f2e2fa);
      font-family:var(--font);min-height:100vh;display:flex;justify-content:center;
      align-items:flex-start;padding:16px;color:#4a3a42;transition:background 0.6s;
      position:relative;overflow-x:hidden;
    }
    body::before{
      content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
      background-image:
        radial-gradient(circle at 15% 20%, rgba(255,182,193,0.25) 0%, transparent 25%),
        radial-gradient(circle at 85% 75%, rgba(255,218,185,0.2) 0%, transparent 30%),
        radial-gradient(circle at 50% 50%, rgba(255,240,245,0.15) 0%, transparent 40%);
    }
    body::after{
      content:'';position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;
      background-image:
        radial-gradient(ellipse at 12% 18%, #ff6b7a 0%, #ff6b7a 30%, transparent 31%),
        radial-gradient(circle at 10% 17%, #ffd700 0%, #ffd700 8%, transparent 9%),
        radial-gradient(ellipse at 78% 82%, #ff6b7a 0%, #ff6b7a 25%, transparent 26%),
        radial-gradient(circle at 76% 81%, #ffd700 0%, #ffd700 6%, transparent 7%),
        radial-gradient(ellipse at 22% 78%, #ff8fa3 0%, #ff8fa3 35%, transparent 36%),
        radial-gradient(circle at 65% 12%, #ffb3c6 0%, #ffb3c6 20%, transparent 21%),
        radial-gradient(circle at 35% 88%, #ffccd5 0%, #ffccd5 15%, transparent 16%),
        radial-gradient(ellipse at 55% 25%, rgba(255,255,255,0.5) 0%, transparent 30%),
        radial-gradient(ellipse at 28% 65%, rgba(255,255,255,0.4) 0%, transparent 25%);
      background-size: 100% 100%;
      opacity:0.8;
    }
    .app-container{
      width:100%;max-width:480px;background:rgba(255,248,250,0.75);
      backdrop-filter:blur(18px);border-radius:38px;
      box-shadow:0 20px 45px rgba(180,130,150,0.3), inset 0 1px 10px rgba(255,255,255,0.7);
      padding:18px 16px;border:2px solid rgba(255,220,230,0.6);
      position:relative;z-index:1;
    }
    .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .title{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,#d47b8c,#b578a6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .nav-btns button{background:#fff;border:none;padding:8px 14px;border-radius:30px;font-weight:600;color:#b17a8a;margin-left:6px;cursor:pointer;font-size:0.85rem;box-shadow:0 2px 8px rgba(180,150,160,0.1)}
    .card{
      background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:14px;
      box-shadow:0 3px 10px rgba(180,150,160,0.15);
      border:2px solid #fbdde5;
      position:relative;
    }
    .card::before{
      content:'';position:absolute;top:-6px;left:20px;right:20px;height:12px;
      background:radial-gradient(circle at 10px 6px, #fff 4px, transparent 5px),
                 radial-gradient(circle at 30px 6px, #fff 4px, transparent 5px),
                 radial-gradient(circle at 50px 6px, #fff 4px, transparent 5px),
                 radial-gradient(circle at 70px 6px, #fff 4px, transparent 5px),
                 radial-gradient(circle at 90px 6px, #fff 4px, transparent 5px),
                 linear-gradient(to bottom, #fce4ec 2px, transparent 3px);
      background-size:100px 12px;
      background-repeat:repeat-x;
      border-radius:6px;
    }
    .row{display:flex;justify-content:space-around;text-align:center;flex-wrap:wrap;gap:8px}
    .page{display:none}
    .page.active{display:block}    .bro-svg{display:inline-block;cursor:pointer;transition:transform 0.2s;user-select:none;position:relative}
    .bro-svg:active{transform:scale(1.15)}
    .bro-svg svg{width:100px;height:100px}
    .heart-particle{
      position:absolute;font-size:1.5rem;animation:floatUp 1.5s ease-out forwards;pointer-events:none;z-index:10;
    }
    @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-100px) scale(1.8)}}
    .click-particle{
      position:fixed;pointer-events:none;z-index:999;
      animation:clickBurst 0.8s ease-out forwards;
    }
    @keyframes clickBurst{
      0%{transform:translate(0,0) scale(1);opacity:1}
      100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}
    }
    .meal-card{
      background:var(--card);border-radius:var(--radius);padding:14px;
      box-shadow:0 3px 10px rgba(180,150,160,0.15);
      border:2px solid #f9e2ec;margin-bottom:10px;position:relative;
    }
    .meal-card::after{
      content:'';position:absolute;bottom:-4px;left:15px;right:15px;height:8px;
      background:repeating-linear-gradient(90deg, #fce4ec 0px, #fce4ec 8px, transparent 8px, transparent 12px);
      border-radius:0 0 20px 20px;
    }
    .meal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .meal-kcal{font-weight:700;color:#d46b82;background:#ffeef3;padding:4px 12px;border-radius:20px;font-size:0.9rem}
    .food-item{display:flex;justify-content:space-between;align-items:center;font-size:0.85rem;padding:4px 0;border-bottom:1px dashed #f3d8e2}
    .food-item button{background:none;border:none;color:#d4888e;font-size:1.2rem;cursor:pointer}
    .add-area{display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap}
    .add-area input{flex:1;min-width:100px;padding:8px 12px;border-radius:30px;border:1.5px solid #f0c8d8;font-size:0.8rem;background:#fffbfc}
    .add-area select{padding:6px 10px;border-radius:20px;border:1.5px solid #f0c8d8;font-size:0.75rem;background:#fffbfc}
    .add-area button{background:#f9a8c4;border:none;color:#fff;font-weight:700;padding:6px 12px;border-radius:30px;font-size:0.8rem;cursor:pointer;white-space:nowrap}
    .bro-bubble{background:#fff;border-radius:22px;padding:14px;display:flex;gap:10px;align-items:center;border:1.5px solid #fad6e5}
    .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;text-align:center}
    .cal-day{padding:10px 4px;border-radius:12px;cursor:pointer;font-weight:600;font-size:0.85rem;background:#fff;transition:0.2s}
    .cal-day.recorded{background:#f9a8c4;color:#fff}
    .cal-day.today{border:2px solid #d47b8c}
    .skin-card{display:inline-block;width:80px;height:80px;border-radius:20px;margin:6px;cursor:pointer;border:3px solid transparent;text-align:center;line-height:80px;font-size:0.8rem;font-weight:700;position:relative;overflow:hidden}
    .skin-card.selected{border-color:#d47b8c}
    .skin-card.locked{opacity:0.5}
    .coin-display{background:#fff;padding:6px 14px;border-radius:30px;font-weight:700;color:#d4a017;display:inline-block;margin-bottom:10px}
    .secret-btn{position:fixed;bottom:20px;right:20px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.5);border:1px dashed #f9a8c4;cursor:pointer;font-size:0.7rem;z-index:50;opacity:0.5;transition:0.3s}
    .secret-btn:hover{opacity:1;background:#fff}
    input[type="number"]{width:60px;padding:4px;border-radius:20px;border:1.5px solid #f0c8d8;text-align:center;font-weight:700}
    .back-btn{background:none;border:none;font-size:1.5rem;cursor:pointer;padding:0 8px}
  </style>
</head><body id="mainBody">
<div class="app-container" id="app">

    <div class="card row">
      <div><strong>本月记录</strong><br><span id="monthDays">0</span> 天</div>
      <div><strong>连续打卡</strong><br><span id="streakDays">0</span> 天</div>

    </div>
    <button style="width:100%;padding:14px;background:#f9a8c4;color:#fff;border:none;border-radius:30px;font-size:1.1rem;font-weight:700;cursor:pointer;margin-bottom:10px" id="goRecordBtn">📝 记录今日三餐</button>
    <div class="bro-bubble"><span style="font-size:1.5rem">🧸</span><span id="homeBroText">戳戳哥哥的小熊，他会很开心哦~</span></div>
  </div>

  <!-- ====== 页面2：日历页 ====== -->
  <div class="page" id="page-calendar">
    <div class="header"><button class="back-btn" id="calBackBtn">←</button><span class="title">📅 本月日历</span><span></span></div>
    <div style="text-align:center;margin-bottom:10px;font-weight:700" id="calMonthLabel"></div>
    <div class="calendar-grid" id="calendarGrid"></div>
    <div style="text-align:center;margin-top:8px">
      <button id="prevMonthBtn" style="background:#fff;border:1.5px solid #f0c8d8;padding:6px 16px;border-radius:20px;margin-right:8px">◀ 上月</button>
      <button id="nextMonthBtn" style="background:#fff;border:1.5px solid #f0c8d8;padding:6px 16px;border-radius:20px">下月 ▶</button>
    </div>
  </div>

  <!-- ====== 页面3：记录页 ====== -->
  <div class="page" id="page-record">
    <div class="header"><button class="back-btn" id="recBackBtn">←</button><span class="title">📝 记录三餐</span><span id="recDateLabel"></span></div>
    <div class="card row">
      <div><strong>体重</strong><br><input type="number" id="weightInput" value="52" step="0.1" min="30" max="120"> kg</div>

  <!-- ====== 页面4：皮肤商店 ====== -->
  <div class="page" id="page-shop">
    <div class="header"><button class="back-btn" id="shopBackBtn">←</button><span class="title">🎨 皮肤商店</span><span></span></div>
    <div class="coin-display">🪙 <span id="shopCoinCount">0</span> 金币</div>
    <div id="skinList" style="text-align:center"></div>
    <div class="bro-bubble"><span style="font-size:1.5rem">🧸</span><span id="shopBroText">金币可以通过每日打卡获得哦~</span></div>

</div>
<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">

<!-- 哥哥的小金库按钮 -->
<button class="secret-btn" id="secretCoinBtn" title="哥哥的小金库">🐾</button><script>
(function(){
  const STORAGE_KEY = 'canteen_v5';
  let appData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  if(!appData.days) appData.days = {};
  if(!appData.coins) appData.coins = 0;
  if(!appData.skins) appData.skins = {owned:['default'],active:'default'};
  let today = new Date().toISOString().split('T')[0];
  let currentRecordDate = today;
  let calYear = new Date().getFullYear();
  let calMonth = new Date().getMonth() + 1;

  function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }
  function getDay(d){
    if(!appData.days[d]) appData.days[d] = {foods:{breakfast:[],lunch:[],dinner:[],snack:[]},weight:52,checkedIn:false};
    return appData.days[d];
  }

  // 食物数据库
  const baseIngredients = {
    '米饭':{kcal:116,g:150},'馒头':{kcal:223,g:100},'面条':{kcal:137,g:200},'鸡蛋':{kcal:144,g:50},
    '牛奶':{kcal:54,g:250},'苹果':{kcal:53,g:200},'香蕉':{kcal:93,g:120},'鸡胸肉':{kcal:133,g:150},
    '牛排':{kcal:250,g:200},'番茄':{kcal:18,g:150},'茄子':{kcal:23,g:150},'土豆':{kcal:81,g:150},
    '黄瓜':{kcal:16,g:200},'胡萝卜':{kcal:37,g:100},'西兰花':{kcal:34,g:100},'豆腐':{kcal:60,g:150},
    '猪肉(瘦)':{kcal:143,g:100},'牛肉':{kcal:125,g:100},'食用油':{kcal:884,g:10},'白糖':{kcal:400,g:5}
  };
  const recipeDB = {
    '番茄炒蛋':[{i:'番茄',q:1.5},{i:'鸡蛋',q:2},{i:'食用油',q:1},{i:'白糖',q:0.5}],
    '肉末茄子':[{i:'茄子',q:2},{i:'猪肉(瘦)',q:0.8},{i:'食用油',q:1.5}],
    '豚骨拉面':[{i:'面条',q:2},{i:'猪肉(瘦)',q:0.5},{i:'鸡蛋',q:1}],
    '麻婆豆腐':[{i:'豆腐',q:2},{i:'猪肉(瘦)',q:0.6},{i:'食用油',q:1}]
  };

  // 皮肤定义
  const skins = [
    {id:'default',name:'奶油粉',bg:'linear-gradient(145deg,#ffecf2,#fde4ee 40%,#f2e2fa)',price:0,emoji:'🌸',effect:'petals',particleColors:['#ff6b7a','#ffb3c6','#fff','#ffccd5']},
    {id:'starry',name:'星空蓝',bg:'linear-gradient(145deg,#1a1a3e,#2d2d5e 40%,#1a1a4e)',price:50,emoji:'🌟',effect:'stars',particleColors:['#ffd700','#fffacd','#fff','#ffe4b5']},
    {id:'forest',name:'森林绿',bg:'linear-gradient(145deg,#e8f5e9,#c8e6c9 40%,#dcedc8)',price:50,emoji:'🌿',effect:'leaves',particleColors:['#81c784','#a5d6a7','#fff','#c8e6c9']},
    {id:'sunset',name:'落日橘',bg:'linear-gradient(145deg,#fff3e0,#ffe0b2 40%,#ffccbc)',price:80,emoji:'🌅',effect:'bubbles',particleColors:['#ff9800','#ffcc80','#fff','#ffe0b2']},
    {id:'lavender',name:'薰衣草',bg:'linear-gradient(145deg,#f3e5f5,#e1bee7 40%,#f8bbd0)',price:80,emoji:'💜',effect:'flowers',particleColors:['#ce93d8','#e1bee7','#fff','#f3e5f5']},
    {id:'ocean',name:'海洋蓝',bg:'linear-gradient(145deg,#e0f7fa,#b2ebf2 40%,#80deea)',price:100,emoji:'🌊',effect:'waves',particleColors:['#4fc3f7','#b3e5fc','#fff','#e1f5fe']}
  ];

  let particleInterval = null;
  let particleContainer = null;

  function applySkin(skinId){
    const skin = skins.find(s=>s.id===skinId) || skins[0];
    document.getElementById('mainBody').style.background = skin.bg;
    appData.skins.active = skinId;
    save();
    startParticles(skin.effect);
  }

  function startParticles(effect){
    if(particleInterval) clearInterval(particleInterval);
    if(particleContainer) particleContainer.remove();
    particleContainer = document.createElement('div');
    particleContainer.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden';
    document.body.appendChild(particleContainer);
    const emojis = {'petals':['🌸','💮','🌷'],'stars':['✨','⭐','💫'],'leaves':['🍃','🌿','🍀'],'bubbles':['🫧','💭'],'flowers':['💜','🪻'],'waves':['🌊','💦']};
    const selected = emojis[effect]||['✨'];
    const styleId='skin-particle-styles';
    let styleEl=document.getElementById(styleId);
    if(!styleEl){styleEl=document.createElement('style');styleEl.id=styleId;document.head.appendChild(styleEl);}
    styleEl.textContent=`
      @keyframes petals{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(360deg);opacity:0}}
      @keyframes stars{0%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1.5)}100%{opacity:0;transform:scale(0)}}
      @keyframes leaves{0%{transform:translateY(0) translateX(0) rotate(0deg)}100%{transform:translateY(100vh) translateX(50px) rotate(180deg)}}
      @keyframes bubbles{0%{transform:translateY(0) scale(0.5);opacity:0.8}100%{transform:translateY(-100vh) scale(1.5);opacity:0}}
      @keyframes flowers{0%{transform:translateY(0) rotate(0deg)}100%{transform:translateY(100vh) rotate(-360deg)}}
      @keyframes waves{0%{transform:translateY(0);opacity:0.7}100%{transform:translateY(-110vh);opacity:0}}
    `;
    function cp(){
      const el=document.createElement('span');
      el.textContent=selected[Math.floor(Math.random()*selected.length)];
      el.style.cssText=`position:absolute;left:${Math.random()*100}%;top:${effect==='waves'?'110%':'-5%'};font-size:${12+Math.random()*20}px;animation:${effect} ${2+Math.random()*4}s linear forwards;opacity:${0.5+Math.random()*0.5}`;
      particleContainer.appendChild(el);
      setTimeout(()=>el.remove(),5000);
    }
    particleInterval=setInterval(cp,effect==='stars'?400:800);
    for(let i=0;i<8;i++) setTimeout(cp,i*200);
  }

  function switchPage(pageId){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page-'+pageId).classList.add('active');
  }// ========== 主页渲染 ==========
function renderHome(){
  const todayDay = getDay(today);
  const allMeals = [...todayDay.foods.breakfast,...todayDay.foods.lunch,...todayDay.foods.dinner,...todayDay.foods.snack];
  const todayKcal = allMeals.reduce((s,f)=>s+f.kcal,0);
  document.getElementById('homeKcal').textContent = todayKcal;
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth()+1;
  let monthDays=0, streak=0;
  Object.keys(appData.days).forEach(d=>{
    if(d.startsWith(`${year}-${String(month).padStart(2,'0')}`)){
      const day = appData.days[d];
      if([...day.foods.breakfast,...day.foods.lunch,...day.foods.dinner,...day.foods.snack].length>0) monthDays++;
    }
  });
  let checkDate = new Date();
  while(true){
    const ds = checkDate.toISOString().split('T')[0];
    const day = appData.days[ds];
    if(day && [...day.foods.breakfast,...day.foods.lunch,...day.foods.dinner,...day.foods.snack].length>0) streak++;
    else break;
    checkDate.setDate(checkDate.getDate()-1);
  }

  document.getElementById('streakDays').textContent = streak;
  document.getElementById('coinCount').textContent = appData.coins;
  document.getElementById('shopCoinCount').textContent = appData.coins;
  
  // 哥哥表情切换
  const belly = document.getElementById('broBelly');
  if(belly){
    if(todayKcal===0){ belly.setAttribute('ry','18'); }
    else{
      const rec=Math.round((todayDay.weight||52)*22*1.2);
      if(todayKcal>rec*1.3){ belly.setAttribute('ry','28'); }
      else{ belly.setAttribute('ry','20'); }
    }
  }
  const msgs = ['今天也要好好吃饭哦~','戳戳哥哥的小熊，他会很开心~','宝宝最棒了！','记得记录每一餐呀','哥哥一直陪着你'];
  document.getElementById('homeBroText').textContent = msgs[Math.floor(Math.random()*msgs.length)];
}

// ========== 日历渲染 ==========
function renderCalendar(){
  document.getElementById('calMonthLabel').textContent = `${calYear}年 ${calMonth}月`;
  const grid = document.getElementById('calendarGrid');
  const daysInMonth = new Date(calYear,calMonth,0).getDate();
  const firstDay = new Date(calYear,calMonth-1,1).getDay();
  let html = '';
  ['日','一','二','三','四','五','六'].forEach(d=>html+=`<div style="font-weight:700;color:#b17a8a">${d}</div>`);
  for(let i=0;i<firstDay;i++) html+='<div></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds = `${calYear}-${String(calMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const day = appData.days[ds];
    const recorded = day && [...day.foods.breakfast,...day.foods.lunch,...day.foods.dinner,...day.foods.snack].length>0;
    const isToday = ds===today;
    html+=`<div class="cal-day${recorded?' recorded':''}${isToday?' today':''}" data-date="${ds}">${d}</div>`;
  }
  grid.innerHTML = html;
  grid.onclick = function(e){
    const el = e.target.closest('.cal-day');
    if(!el) return;
    currentRecordDate = el.dataset.date;
    switchPage('record');
    renderRecord();
  };
}

// ========== 记录页渲染 ==========
function smartEstimate(query, portion){
  const lower = query.toLowerCase();
  const foodTypes = {'米':116,'面':137,'饭':116,'饼':250,'猪':250,'牛':200,'鸡':150,'鱼':100,'虾':90,'菜':25,'蔬':25,'菇':25,'豆':80,'茄':23,'瓜':16,'果':55,'奶':54,'蛋':144,'油':884,'糖':400};
  const cookingMethods = {'蒸':1.0,'煮':1.0,'清':1.0,'白':1.0,'炒':1.5,'烧':1.6,'焖':1.5,'炖':1.4,'炸':2.2,'酥':2.0,'脆':2.0,'红':1.7,'酱':1.5,'卤':1.4,'烤':1.6};
  let baseKcal=150;
  for(let[k,v]of Object.entries(foodTypes)){if(lower.includes(k)){baseKcal=v;break;}}
  let methodMultiplier=1.4;
  for(let[k,v]of Object.entries(cookingMethods)){if(lower.includes(k)){methodMultiplier=v;break;}}
  const kcalPer100g=Math.round(baseKcal*methodMultiplier);
  const grams=200*portion;
  return{name:query,kcal:Math.round(kcalPer100g*grams/100),grams,source:'🤖',confidence:'medium'};
}

function calculateFood(query, portion){
  const exactMatch = baseIngredients[query];
  if(exactMatch){const grams=Math.round(exactMatch.g*portion);return{name:query,kcal:Math.round(exactMatch.kcal*grams/100),grams,source:'📊',confidence:'high'};}
  const recipe = recipeDB[query];
  if(recipe){let tk=0,tg=0;recipe.forEach(item=>{const ing=baseIngredients[item.i];if(ing){const g=ing.g*item.q*portion;tg+=g;tk+=Math.round(ing.kcal*g/100);}});return{name:query,kcal:tk,grams:Math.round(tg),source:'🧑‍🍳',confidence:'high'};}
  return smartEstimate(query,portion);
}

async function searchOnlineFood(query){
  try{
    const response = await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&json=1&page_size=3`);
    const data = await response.json();
    if(data.products&&data.products.length>0){
      return data.products.map(p=>{
        const kcalPer100g=p.nutriments?.['energy-kcal_100g'];
        if(!kcalPer100g)return null;
        const servingSize=p.serving_size?parseFloat(p.serving_size):100;
        return{name:p.product_name||query,kcal:Math.round(kcalPer100g*servingSize/100),grams:servingSize,source:'🌐',confidence:'high'};
      }).filter(Boolean);
    }
  }catch(e){}
  return[];
}function renderRecord(){
  const day = getDay(currentRecordDate);
  const w = day.weight||52;
  document.getElementById('weightInput').value = w;
  document.getElementById('recDateLabel').textContent = currentRecordDate;
  const bmi = (w/1.6/1.6).toFixed(1);
  const rec = Math.round(w*22*1.2);
  document.getElementById('bmiValue').textContent = bmi;
  document.getElementById('recKcal').textContent = rec;
  const meals = [
    {id:'breakfast',title:'🌤️ 早餐',foods:day.foods.breakfast},
    {id:'lunch',title:'☀️ 午餐',foods:day.foods.lunch},
    {id:'dinner',title:'🌙 晚餐',foods:day.foods.dinner},
    {id:'snack',title:'🍪 加餐',foods:day.foods.snack}
  ];
  let totalKcal=0;
  const grid = document.getElementById('mealsGrid');
  grid.innerHTML='';
  meals.forEach(meal=>{
    const mkcal = meal.foods.reduce((s,f)=>s+f.kcal,0);
    totalKcal+=mkcal;
    const card = document.createElement('div');
    card.className='meal-card';
    card.innerHTML=`
      <div class="meal-header"><strong>${meal.title}</strong><span class="meal-kcal">🔥 ${mkcal} kcal</span></div>
      <div>${meal.foods.map((f,i)=>`<div class="food-item"><span>🍽 ${f.name} <small>${f.source||''}</small> (${f.grams}g ×${f.qty||1})</span><span>${f.kcal} kcal <button class="edit-btn" data-meal="${meal.id}" data-idx="${i}">✏️</button><button class="del-btn" data-meal="${meal.id}" data-idx="${i}">✕</button></span></div>`).join('')||'<div style="color:#aaa;font-size:0.8rem">暂无食物</div>'}</div>
      <div class="add-area">
        <input type="text" class="food-search" placeholder="搜索食物">
        <select class="portion-select"><option value="1">1份</option><option value="0.5">半份</option><option value="0.33">1/3份</option><option value="0.25">1/4份</option><option value="2">2份</option></select>
        <button class="add-btn" data-meal="${meal.id}">添加</button>
      </div>`;
    grid.appendChild(card);
    card.querySelectorAll('.del-btn').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();getDay(currentRecordDate).foods[this.dataset.meal].splice(parseInt(this.dataset.idx),1);save();renderRecord();});});
    card.querySelectorAll('.edit-btn').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();const idx=parseInt(this.dataset.idx);const food=getDay(currentRecordDate).foods[this.dataset.meal][idx];const newKcal=prompt('修改热量 (千卡)',food.kcal);if(newKcal){food.kcal=parseInt(newKcal);food.source='✏️';save();renderRecord();}});});
    card.querySelector('.add-btn').addEventListener('click', async function(e){
      e.stopPropagation();
      const query = card.querySelector('.food-search').value.trim();
      if(!query){alert('请输入食物名称');return;}
      const portion = parseFloat(card.querySelector('.portion-select').value);
      const localResult = calculateFood(query, portion);
      const onlineResults = await searchOnlineFood(query);
      if(onlineResults.length>0){
        const onlineFood=onlineResults[0];
        getDay(currentRecordDate).foods[this.dataset.meal].push({name:onlineFood.name,kcal:Math.round(onlineFood.kcal*portion),grams:Math.round(onlineFood.grams*portion),source:onlineFood.source,qty:portion});
      }else{
        getDay(currentRecordDate).foods[this.dataset.meal].push({name:localResult.name,kcal:localResult.kcal,grams:localResult.grams,source:localResult.source,qty:portion});
      }
      if(!getDay(currentRecordDate).checkedIn){getDay(currentRecordDate).checkedIn=true;appData.coins+=5;}
      save();renderRecord();
    });
  });
  document.getElementById('currentKcal').textContent = totalKcal;
  if(!particleContainer||!document.body.contains(particleContainer)){const skin=skins.find(s=>s.id===appData.skins.active)||skins[0];startParticles(skin.effect);}
}

// ========== 皮肤商店 ==========

  document.getElementById('prevMonthBtn').addEventListener('click',()=>{if(calMonth===1){calMonth=12;calYear--}else calMonth--;renderCalendar();});
  document.getElementById('nextMonthBtn').addEventListener('click',()=>{if(calMonth===12){calMonth=1;calYear++}else calMonth++;renderCalendar();});

  // ========== 点击屏幕粒子特效 ==========
  document.addEventListener('click',function(e){

    const skin=skins.find(s=>s.id===appData.skins.active)||skins[0];

      const particle=document.createElement('div');
      particle.className='click-particle';
      const angle=(Math.PI*2*i)/count;
      const distance=30+Math.random()*50;
      const dx=Math.cos(angle)*distance;
      const dy=Math.sin(angle)*distance;
      particle.style.cssText=`
        left:${e.clientX}px;top:${e.clientY}px;

  // ========== 哥哥的小金库 ==========
