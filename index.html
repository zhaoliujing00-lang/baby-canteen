<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>🍰 宝宝小食堂</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="宝宝小食堂">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23ffd1e0'/><text y='.9em' font-size='70' text-anchor='middle' x='50'>🍰</text></svg>">
  <link rel="manifest" id="pwaManifest">
  <meta name="theme-color" content="#fff5f9">
  <style>
    :root{--bg:#fff5f9;--card:#fff;--pink:#ffd1e0;--rose:#f9a8c4;--shadow:0 6px 22px rgba(210,180,190,0.25);--radius:26px;--font:'PingFang SC','Microsoft YaHei',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);font-family:var(--font);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:16px;color:#4a3a42;transition:background 0.6s;position:relative;overflow-x:hidden}
    .photo-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;background-size:cover;background-position:center;background-repeat:no-repeat;display:none}
    .photo-bg.active{display:block}
    .photo-bg.blur{filter:blur(8px)}
    .app-container{width:100%;max-width:480px;background:rgba(255,248,250,0.75);backdrop-filter:blur(18px);border-radius:38px;box-shadow:0 20px 45px rgba(180,130,150,0.3),inset 0 1px 10px rgba(255,255,255,0.7);padding:18px 16px;border:2px solid rgba(255,220,230,0.6);position:relative;z-index:1}
    .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .title{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,#d47b8c,#b578a6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .nav-btns button{background:#fff;border:none;padding:8px 14px;border-radius:30px;font-weight:600;color:#b17a8a;margin-left:6px;cursor:pointer;font-size:0.85rem;box-shadow:0 2px 8px rgba(180,150,160,0.1)}
    .card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:14px;box-shadow:0 3px 10px rgba(180,150,160,0.15);border:2px solid #fbdde5;position:relative}
    .row{display:flex;justify-content:space-around;text-align:center;flex-wrap:wrap;gap:8px}
    .page{display:none}
    .page.active{display:block}
    .bro-area{text-align:center;position:relative;padding:10px 0}
    .bro-emoji{font-size:5rem;display:inline-block;cursor:pointer;transition:transform 0.2s;user-select:none;position:relative;z-index:3}
    .bro-emoji:active{transform:scale(1.2)}
    .heart-particle{position:absolute;font-size:1.5rem;animation:floatUp 1.5s ease-out forwards;pointer-events:none;z-index:10}
    @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-100px) scale(1.8)}}
    .click-particle{position:fixed;pointer-events:none;z-index:999;animation:clickBurst 0.8s ease-out forwards}
    @keyframes clickBurst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
    .meal-card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:0 3px 10px rgba(180,150,160,0.15);border:2px solid #f9e2ec;margin-bottom:10px}
    .meal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .meal-kcal{font-weight:700;color:#d46b82;background:#ffeef3;padding:4px 12px;border-radius:20px;font-size:0.9rem}
    .food-item{display:flex;justify-content:space-between;align-items:center;font-size:0.85rem;padding:4px 0;border-bottom:1px dashed #f3d8e2}
    .food-item button{background:none;border:none;color:#d4888e;font-size:1.2rem;cursor:pointer}
    .add-area{display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap}
    .add-area input{flex:1;min-width:100px;padding:8px 12px;border-radius:30px;border:1.5px solid #f0c8d8;font-size:0.8rem;background:#fffbfc}
    .add-area select{padding:6px 10px;border-radius:20px;border:1.5px solid #f0c8d8;font-size:0.75rem;background:#fffbfc}
    .add-area button{background:#f9a8c4;border:none;color:#fff;font-weight:700;padding:6px 12px;border-radius:30px;font-size:0.8rem;cursor:pointer;white-space:nowrap}
    .bro-bubble{background:#fff;border-radius:22px;padding:14px;display:flex;gap:10px;align-items:center;border:1.5px solid #fad6e5}
    .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;text-align:center}
    .cal-day{padding:10px 4px;border-radius:12px;cursor:pointer;font-weight:600;font-size:0.85rem;background:#fff;transition:0.2s}
    .cal-day.recorded{background:#f9a8c4;color:#fff}
    .cal-day.today{border:2px solid #d47b8c}
    .skin-card{display:inline-block;width:75px;height:75px;border-radius:20px;margin:5px;cursor:pointer;border:3px solid transparent;text-align:center;line-height:75px;font-size:0.7rem;font-weight:700}
    .skin-card.selected{border-color:#d47b8c}
    .skin-card.locked{opacity:0.5}
    .effect-option{display:inline-block;padding:8px 12px;margin:4px;border-radius:20px;cursor:pointer;border:2px solid transparent;font-size:0.85rem;background:#fff;transition:0.2s}
    .effect-option.selected{border-color:#f9a8c4;background:#fff0f5}
    .coin-display{background:#fff;padding:6px 14px;border-radius:30px;font-weight:700;color:#d4a017;display:inline-block;margin-bottom:10px}
    .secret-btn{position:fixed;bottom:20px;right:20px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.5);border:1px dashed #f9a8c4;cursor:pointer;font-size:0.7rem;z-index:50;opacity:0.5;transition:0.3s}
    .secret-btn:active{opacity:1;background:#fff}
    input[type="number"]{width:60px;padding:4px;border-radius:20px;border:1.5px solid #f0c8d8;text-align:center;font-weight:700}
    .back-btn{background:none;border:none;font-size:1.5rem;cursor:pointer;padding:0 8px}
    .setting-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px dashed #f3d8e2}
    .setting-label{font-weight:600;font-size:0.9rem}
  </style>
</head>
<body id="mainBody">
<div class="photo-bg" id="photoBg"></div>

<div class="app-container" id="app">
  <!-- ====== 主页 ====== -->
  <div class="page active" id="page-home">
    <div class="header">
      <span class="title">🍰 宝宝小食堂</span>
      <div class="nav-btns">
        <button id="goSettingsBtn">⚙️</button>
        <button id="goCalendarBtn">📅 日历</button>
        <button id="goShopBtn">🎨 皮肤</button>
      </div>
    </div>
    <div class="bro-area"><div class="bro-emoji" id="broEmoji">🧸</div><div style="color:#b17a8a;font-size:0.8rem">戳戳哥哥有惊喜~</div></div>
    <div class="coin-display">🪙 <span id="coinCount">0</span> 金币</div>
    <div class="card row">
      <div><strong>本月记录</strong><br><span id="monthDays">0</span> 天</div>
      <div><strong>连续打卡</strong><br><span id="streakDays">0</span> 天</div>
      <div><strong>今日摄入</strong><br><span id="homeKcal">0</span> kcal</div>
    </div>
    <button style="width:100%;padding:14px;background:#f9a8c4;color:#fff;border:none;border-radius:30px;font-size:1.1rem;font-weight:700;cursor:pointer;margin-bottom:10px" id="goRecordBtn">📝 记录今日三餐</button>
    <div class="bro-bubble"><span style="font-size:1.5rem">🧸</span><span id="homeBroText">戳戳哥哥的小熊，他会很开心哦~</span></div>
  </div>

  <!-- ====== 日历页 ====== -->
  <div class="page" id="page-calendar">
    <div class="header"><button class="back-btn" id="calBackBtn">←</button><span class="title">📅 本月日历</span><span></span></div>
    <div style="text-align:center;margin-bottom:10px;font-weight:700" id="calMonthLabel"></div>
    <div class="calendar-grid" id="calendarGrid"></div>
    <div style="text-align:center;margin-top:8px">
      <button id="prevMonthBtn" style="background:#fff;border:1.5px solid #f0c8d8;padding:6px 16px;border-radius:20px;margin-right:8px">◀ 上月</button>
      <button id="nextMonthBtn" style="background:#fff;border:1.5px solid #f0c8d8;padding:6px 16px;border-radius:20px">下月 ▶</button>
    </div>
  </div>

  <!-- ====== 记录页 ====== -->
  <div class="page" id="page-record">
    <div class="header"><button class="back-btn" id="recBackBtn">←</button><span class="title">📝 记录三餐</span><span id="recDateLabel"></span></div>
    <div class="card row">
      <div><strong>体重</strong><br><input type="number" id="weightInput" value="52" step="0.1" min="30" max="120"> kg</div>
      <div><strong>BMI</strong><br><span id="bmiValue">-</span></div>
      <div><strong>推荐</strong><br><span id="recKcal">-</span> kcal</div>
      <div><strong>已摄入</strong><br><span id="currentKcal">0</span> kcal</div>
    </div>
    <div id="mealsGrid"></div>
  </div>

  <!-- ====== 皮肤商店 ====== -->
  <div class="page" id="page-shop">
    <div class="header"><button class="back-btn" id="shopBackBtn">←</button><span class="title">🎨 皮肤商店</span><span></span></div>
    <div class="coin-display">🪙 <span id="shopCoinCount">0</span> 金币</div>
    <div id="skinList" style="text-align:center"></div>
    <div class="bro-bubble"><span style="font-size:1.5rem">🧸</span><span id="shopBroText">金币可以通过每日打卡获得哦~</span></div>
  </div>

  <!-- ====== 设置页 ====== -->
  <div class="page" id="page-settings">
    <div class="header"><button class="back-btn" id="settingsBackBtn">←</button><span class="title">⚙️ 设置</span><span></span></div>
    <div class="card">
      <div class="setting-row"><span class="setting-label">📷 背景照片</span></div>
      <button id="photoFromCamera" style="width:100%;margin:4px 0">📷 拍照</button>
      <button id="photoFromGallery" style="width:100%;margin:4px 0">🖼️ 从相册选择</button>
      <button id="photoRemove" style="width:100%;margin:4px 0;background:#ddd;color:#555">🗑️ 移除照片</button>
    </div>
    <div class="card">
      <div class="setting-row"><span class="setting-label">🌫️ 照片模式</span></div>
      <select id="photoMode" style="width:100%;padding:8px;border-radius:16px;border:1.5px solid #f0c8d8;font-size:0.85rem;background:#fffbfc">
        <option value="clear">全屏清晰</option>
        <option value="blur">柔和模糊</option>
      </select>
    </div>
    <div class="card">
      <div class="setting-row"><span class="setting-label">✨ 点击特效</span></div>
      <div id="effectList" style="text-align:center"></div>
    </div>
  </div>
</div>

<input type="file" id="bgPhotoInput" accept="image/*" style="display:none">
<input type="file" id="bgGalleryInput" accept="image/*" style="display:none">
<button class="secret-btn" id="secretCoinBtn">🐾</button>
<script>
(function(){
  const STORAGE_KEY = 'canteen_v7';
  let appData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  if(!appData.days) appData.days = {};
  if(!appData.coins) appData.coins = 0;
  if(!appData.skins) appData.skins = {owned:['default'],active:'default'};
  if(!appData.bgPhoto) appData.bgPhoto = null;
  if(!appData.photoMode) appData.photoMode = 'clear';
  if(!appData.clickEffect) appData.clickEffect = 'hearts';
  let today = new Date().toISOString().split('T')[0];
  let currentRecordDate = today;
  let calYear = new Date().getFullYear();
  let calMonth = new Date().getMonth() + 1;

  function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }
  function getDay(d){
    if(!appData.days[d]) appData.days[d] = {foods:{breakfast:[],lunch:[],dinner:[],snack:[]},weight:52,checkedIn:false};
    return appData.days[d];
  }

  // 皮肤
  const skins = [
    {id:'default',name:'奶油粉',bg:'linear-gradient(145deg,#ffecf2,#fde4ee 40%,#f2e2fa)',price:0,emoji:'🌸'},
    {id:'starry',name:'星空蓝',bg:'linear-gradient(145deg,#1a1a3e,#2d2d5e 40%,#1a1a4e)',price:50,emoji:'🌟'},
    {id:'forest',name:'森林绿',bg:'linear-gradient(145deg,#e8f5e9,#c8e6c9 40%,#dcedc8)',price:50,emoji:'🌿'},
    {id:'sunset',name:'落日橘',bg:'linear-gradient(145deg,#fff3e0,#ffe0b2 40%,#ffccbc)',price:80,emoji:'🌅'},
    {id:'lavender',name:'薰衣草',bg:'linear-gradient(145deg,#f3e5f5,#e1bee7 40%,#f8bbd0)',price:80,emoji:'💜'},
    {id:'ocean',name:'海洋蓝',bg:'linear-gradient(145deg,#e0f7fa,#b2ebf2 40%,#80deea)',price:100,emoji:'🌊'}
  ];

  // 点击特效
  const effects = [
    {id:'hearts',name:'💖 爱心',type:'pattern',emoji:'💖'},
    {id:'stars',name:'⭐ 星光',type:'pattern',emoji:'⭐'},
    {id:'petals',name:'🌸 花瓣',type:'pattern',emoji:'🌸'},
    {id:'bubbles',name:'🫧 泡泡',type:'pattern',emoji:'🫧'},
    {id:'ribbons',name:'🎀 彩带',type:'pattern',emoji:'🎀'},
    {id:'snow',name:'❄️ 雪花',type:'pattern',emoji:'❄️'},
    {id:'butterflies',name:'🦋 蝴蝶',type:'pattern',emoji:'🦋'},
    {id:'candy',name:'🍬 糖果',type:'pattern',emoji:'🍬'},
    {id:'pawprints',name:'🐾 爪印',type:'pattern',emoji:'🐾'},
    {id:'notes',name:'🎵 音符',type:'pattern',emoji:'🎵'},
    {id:'stardust',name:'🌟 星尘粒子',type:'particle',color:'#ffd700'},
    {id:'sakura',name:'🌸 樱花粒子',type:'particle',color:'#ffb7c5'},
    {id:'oceanp',name:'🌊 海洋粒子',type:'particle',color:'#4fc3f7'},
    {id:'aurora',name:'💫 极光粒子',type:'particle',color:'#ce93d8'},
    {id:'sunsetp',name:'🌅 暖阳粒子',type:'particle',color:'#ff9800'},
    {id:'diamond',name:'💎 钻石粒子',type:'particle',color:'#fff'},
    {id:'rainbow',name:'🌈 彩虹粒子',type:'particle',color:'random'},
    {id:'none',name:'🚫 关闭',type:'none'}
  ];

  // 份量预设
  const portionPresets = [
    {label:'🍜 正常份',value:1},{label:'🥢 半份',value:0.5},
    {label:'一大口',value:30},{label:'几筷子',value:15},{label:'一小片',value:5},{label:'一小撮',value:3}
  ];

  // 哥哥话语库
  const broQuotes = [
    '今天也要好好吃饭哦~','戳戳哥哥的小熊，他会很开心~','宝宝最棒了！','记得记录每一餐呀','哥哥一直陪着你',
    '今天有好好喝水吗？','宝宝笑起来最好看了','累了就歇会儿，哥哥陪你','你记录的样子真可爱','每一餐都值得被记住',
    '哥哥的小熊为你加油','今天吃蔬菜了吗？','你是哥哥最珍贵的宝贝','不要饿着自己哦',
    '今天天气真好，适合吃好吃的','宝宝又坚持了一天，真厉害','哥哥最喜欢你了',
    '好好吃饭才能元气满满','你的小食堂永远有位置','今天也要元气满满哦',
    '哥哥的小熊在对你笑呢','每一口都是对自己的爱','你今天真好看','哥哥好想你呀',
    '宝宝最近越来越棒了','你的快乐是哥哥最重要的事','哥哥永远做你的后盾',
    '今天有没有吃水果？','宝宝是哥哥的骄傲','无论发生什么哥哥都在','你的小食堂永远亮着灯',
    '哥哥等你回家吃饭','今天也要开心呀','宝宝是世界上最好的宝宝',
    '累了就睡，饿了就吃','哥哥的小熊守护着你','每一天都是新的开始',
    '你记录的每一餐都是爱自己','哥哥最喜欢陪你聊天了','宝宝今天真可爱','记得早睡哦','明天也要一起加油'
  ];
  function randomQuote(){ return broQuotes[Math.floor(Math.random() * broQuotes.length)]; }

  function applySkin(skinId){
    const skin = skins.find(s=>s.id===skinId) || skins[0];
    document.getElementById('mainBody').style.background = skin.bg;
    appData.skins.active = skinId;
    save();
  }

  function applyBgPhoto(){
    const bg = document.getElementById('photoBg');
    if(appData.bgPhoto){
      bg.style.backgroundImage = `url(${appData.bgPhoto})`;
      bg.classList.add('active');
      if(appData.photoMode === 'blur') bg.classList.add('blur'); else bg.classList.remove('blur');
    } else { bg.classList.remove('active'); }
  }

  function switchPage(pageId){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page-'+pageId).classList.add('active');
  }

  // 主页渲染
  function renderHome(){
    const todayDay = getDay(today);
    const allMeals = [...todayDay.foods.breakfast,...todayDay.foods.lunch,...todayDay.foods.dinner,...todayDay.foods.snack];
    const todayKcal = allMeals.reduce((s,f)=>s+f.kcal,0);
    document.getElementById('homeKcal').textContent = todayKcal;
    const now = new Date(); const year = now.getFullYear(), month = now.getMonth()+1;
    let monthDays=0, streak=0;
    Object.keys(appData.days).forEach(d=>{
      if(d.startsWith(`${year}-${String(month).padStart(2,'0')}`)){
        const day = appData.days[d];
        if([...day.foods.breakfast,...day.foods.lunch,...day.foods.dinner,...day.foods.snack].length>0) monthDays++;
      }
    });
    let checkDate = new Date();
    while(true){
      const ds = checkDate.toISOString().split('T')[0];
      const day = appData.days[ds];
      if(day && [...day.foods.breakfast,...day.foods.lunch,...day.foods.dinner,...day.foods.snack].length>0) streak++;
      else break;
      checkDate.setDate(checkDate.getDate()-1);
    }
    document.getElementById('monthDays').textContent = monthDays;
    document.getElementById('streakDays').textContent = streak;
    document.getElementById('coinCount').textContent = appData.coins;
    document.getElementById('shopCoinCount').textContent = appData.coins;
    document.getElementById('homeBroText').textContent = randomQuote();
  }

  // 日历渲染
  function renderCalendar(){
    document.getElementById('calMonthLabel').textContent = `${calYear}年 ${calMonth}月`;
    const grid = document.getElementById('calendarGrid');
    const daysInMonth = new Date(calYear,calMonth,0).getDate();
    const firstDay = new Date(calYear,calMonth-1,1).getDay();
    let html = '';
    ['日','一','二','三','四','五','六'].forEach(d=>html+=`<div style="font-weight:700;color:#b17a8a">${d}</div>`);
    for(let i=0;i<firstDay;i++) html+='<div></div>';
    for(let d=1;d<=daysInMonth;d++){
      const ds = `${calYear}-${String(calMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const day = appData.days[ds];
      const recorded = day && [...day.foods.breakfast,...day.foods.lunch,...day.foods.dinner,...day.foods.snack].length>0;
      const isToday = ds===today;
      html+=`<div class="cal-day${recorded?' recorded':''}${isToday?' today':''}" data-date="${ds}">${d}</div>`;
    }
    grid.innerHTML = html;
    grid.onclick = function(e){
      const el = e.target.closest('.cal-day');
      if(!el) return;
      currentRecordDate = el.dataset.date;
      switchPage('record');
      renderRecord();
    };
  }
  // 记录页渲染
function renderRecord(){
  const day = getDay(currentRecordDate);
  const w = day.weight||52;
  document.getElementById('weightInput').value = w;
  document.getElementById('recDateLabel').textContent = currentRecordDate;
  const bmi = (w/1.6/1.6).toFixed(1);
  const rec = Math.round(w*22*1.2);
  document.getElementById('bmiValue').textContent = bmi;
  document.getElementById('recKcal').textContent = rec;
  const meals = [
    {id:'breakfast',title:'🌤️ 早餐',foods:day.foods.breakfast},
    {id:'lunch',title:'☀️ 午餐',foods:day.foods.lunch},
    {id:'dinner',title:'🌙 晚餐',foods:day.foods.dinner},
    {id:'snack',title:'🍪 加餐',foods:day.foods.snack}
  ];
  let totalKcal=0;
  const grid = document.getElementById('mealsGrid');
  grid.innerHTML='';
  meals.forEach(meal=>{
    const mkcal = meal.foods.reduce((s,f)=>s+f.kcal,0);
    totalKcal+=mkcal;
    const card = document.createElement('div');
    card.className='meal-card';
    const portionOptions = portionPresets.map(p=>`<option value="${p.value}">${p.label}</option>`).join('');
    card.innerHTML=`
      <div class="meal-header"><strong>${meal.title}</strong><span class="meal-kcal">🔥 ${mkcal} kcal</span></div>
      <div>${meal.foods.map((f,i)=>`<div class="food-item"><span>🍽 ${f.name} (${f.grams}g)</span><span>${f.kcal} kcal <button class="del-btn" data-meal="${meal.id}" data-idx="${i}">✕</button></span></div>`).join('')||'<div style="color:#aaa;font-size:0.8rem">暂无食物</div>'}</div>
      <div class="add-area">
        <input type="text" class="food-search" placeholder="搜索食物">
        <select class="portion-select">${portionOptions}</select>
        <button class="add-btn" data-meal="${meal.id}">添加</button>
      </div>`;
    grid.appendChild(card);
    card.querySelectorAll('.del-btn').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();getDay(currentRecordDate).foods[this.dataset.meal].splice(parseInt(this.dataset.idx),1);save();renderRecord();});});
    card.querySelector('.add-btn').addEventListener('click', function(e){
      e.stopPropagation();
      const query = card.querySelector('.food-search').value.trim();
      if(!query){alert('请输入食物名称');return;}
      const portionValue = parseFloat(card.querySelector('.portion-select').value);
      const grams = portionValue <= 1 ? Math.round(200 * portionValue) : portionValue;
      const kcal = Math.round(grams * 1.2);
      getDay(currentRecordDate).foods[this.dataset.meal].push({name:query,kcal:kcal,grams:grams});
      if(!getDay(currentRecordDate).checkedIn){getDay(currentRecordDate).checkedIn=true;appData.coins+=5;}
      save();renderRecord();
    });
  });
  document.getElementById('currentKcal').textContent = totalKcal;
}
  // 皮肤商店
function renderShop(){
  document.getElementById('shopCoinCount').textContent = appData.coins;
  const list = document.getElementById('skinList');
  list.innerHTML = skins.map(s=>{
    const owned=appData.skins.owned.includes(s.id), active=appData.skins.active===s.id;
    return`<div class="skin-card${active?' selected':''}${!owned?' locked':''}" style="background:${s.bg}" data-id="${s.id}"><div>${s.emoji}</div><div style="font-size:0.65rem">${s.name}</div><div style="font-size:0.6rem">${owned?(active?'使用中':'已拥有'):'🪙'+s.price}</div></div>`;
  }).join('');
  list.onclick=function(e){
    const el=e.target.closest('.skin-card');if(!el)return;
    const id=el.dataset.id;const skin=skins.find(s=>s.id===id);if(!skin)return;
    if(!appData.skins.owned.includes(id)){
      if(appData.coins>=skin.price){appData.coins-=skin.price;appData.skins.owned.push(id);save();applySkin(id);renderShop();document.getElementById('shopBroText').textContent='皮肤已兑换！';}
      else{document.getElementById('shopBroText').textContent='金币不够哦~';}
    }else{applySkin(id);renderShop();document.getElementById('shopBroText').textContent='皮肤已切换！';}
  };
}

// 设置页 - 特效列表
function renderEffectList(){
  const list = document.getElementById('effectList');
  list.innerHTML = effects.map(e=>`<span class="effect-option${appData.clickEffect===e.id?' selected':''}" data-id="${e.id}">${e.name}</span>`).join('');
  list.onclick = function(e){
    const el = e.target.closest('.effect-option'); if(!el) return;
    appData.clickEffect = el.dataset.id; save(); renderEffectList();
  };
}

// 设置页 - 初始化
function initSettingsPage(){
  document.getElementById('photoMode').value = appData.photoMode;
  renderEffectList();
}

// 点击特效
document.addEventListener('click',function(e){
  if(e.target.closest('button')||e.target.closest('input')||e.target.closest('select')) return;
  if(appData.clickEffect === 'none') return;
  const eff = effects.find(ef=>ef.id===appData.clickEffect);
  if(!eff) return;
  const count = eff.type==='pattern' ? 8 : 12;
  for(let i=0;i<count;i++){
    const particle=document.createElement('div');
    particle.className='click-particle';
    const angle=(Math.PI*2*i)/count;
    const distance=30+Math.random()*60;
    particle.style.cssText=`
      left:${e.clientX}px;top:${e.clientY}px;
      font-size:${14+Math.random()*16}px;
      --dx:${Math.cos(angle)*distance}px;--dy:${Math.sin(angle)*distance}px;
      ${eff.type==='pattern'?'' : `width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;background:${eff.color==='random'?`hsl(${Math.random()*360},80%,60%)`:eff.color};border-radius:50%`}
    `;
    if(eff.type==='pattern') particle.textContent = eff.emoji;
    document.body.appendChild(particle);
    setTimeout(()=>particle.remove(),800);
  }
});
    // ========== 事件绑定 ==========
  // 哥哥小熊
  document.getElementById('broEmoji').addEventListener('click', function(){
    const heart=document.createElement('span'); heart.textContent='💖'; heart.className='heart-particle';
    const rect=this.getBoundingClientRect(); heart.style.left=(rect.left+rect.width/2-12)+'px'; heart.style.top=(rect.top-10)+'px';
    document.body.appendChild(heart); setTimeout(()=>heart.remove(),1500);
    document.getElementById('homeBroText').textContent = randomQuote();
  });

  // 页面切换
  document.getElementById('goCalendarBtn').addEventListener('click',()=>{switchPage('calendar');renderCalendar();});
  document.getElementById('goShopBtn').addEventListener('click',()=>{switchPage('shop');renderShop();});
  document.getElementById('goRecordBtn').addEventListener('click',()=>{currentRecordDate=today;switchPage('record');renderRecord();});
  document.getElementById('goSettingsBtn').addEventListener('click',()=>{switchPage('settings');initSettingsPage();});
  document.getElementById('calBackBtn').addEventListener('click',()=>{switchPage('home');renderHome();});
  document.getElementById('recBackBtn').addEventListener('click',()=>{switchPage('home');renderHome();});
  document.getElementById('shopBackBtn').addEventListener('click',()=>{switchPage('home');renderHome();});
  document.getElementById('settingsBackBtn').addEventListener('click',()=>{switchPage('home');renderHome();});
  document.getElementById('prevMonthBtn').addEventListener('click',()=>{if(calMonth===1){calMonth=12;calYear--}else calMonth--;renderCalendar();});
  document.getElementById('nextMonthBtn').addEventListener('click',()=>{if(calMonth===12){calMonth=1;calYear++}else calMonth++;renderCalendar();});
  document.getElementById('weightInput').addEventListener('input',function(){getDay(currentRecordDate).weight=parseFloat(this.value)||52;save();renderRecord();});

  // 背景照片
  document.getElementById('photoFromCamera').addEventListener('click', function(){
    document.getElementById('bgPhotoInput').onchange = function(ev){
      const file = ev.target.files[0]; if(!file) return;
      const reader = new FileReader(); reader.onload = function(e){ appData.bgPhoto = e.target.result; save(); applyBgPhoto(); };
      reader.readAsDataURL(file);
    }; document.getElementById('bgPhotoInput').click();
  });
  document.getElementById('photoFromGallery').addEventListener('click', function(){
    document.getElementById('bgGalleryInput').onchange = function(ev){
      const file = ev.target.files[0]; if(!file) return;
      const reader = new FileReader(); reader.onload = function(e){ appData.bgPhoto = e.target.result; save(); applyBgPhoto(); };
      reader.readAsDataURL(file);
    }; document.getElementById('bgGalleryInput').click();
  });
  document.getElementById('photoRemove').addEventListener('click', function(){ appData.bgPhoto = null; save(); applyBgPhoto(); });
  document.getElementById('photoMode').addEventListener('change', function(){ appData.photoMode = this.value; save(); applyBgPhoto(); });

  // 小金库
  document.getElementById('secretCoinBtn').addEventListener('click',function(){appData.coins+=100;save();renderHome();alert('🐾 +100金币！');});

  // PWA
  const manifest={name:'宝宝小食堂',short_name:'小食堂',start_url:location.href,display:'standalone',background_color:'#fff5f9',theme_color:'#fff5f9',icons:[{src:"data:image/svg+xml,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="#ffd1e0"/><text y=".9em" font-size="70" text-anchor="middle" x="50">🍰</text></svg>'),sizes:'100x100',type:'image/svg+xml'}]};
  document.getElementById('pwaManifest').href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/json'}));

  // 启动
  applySkin(appData.skins.active); applyBgPhoto(); renderHome();
})();
</script>
</body>
</html>
