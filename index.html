<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>🍰 宝宝小食堂 · 流畅版</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="宝宝小食堂">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23ffd1e0'/><text y='.9em' font-size='70' text-anchor='middle' x='50'>🍰</text></svg>">
  <link rel="manifest" id="pwaManifest">
  <meta name="theme-color" content="#fff5f9">
  <style>
    :root{--bg:#fff5f9;--card:#fff;--pink:#ffd1e0;--rose:#f9a8c4;--shadow:0 6px 22px rgba(210,180,190,0.25);--radius:26px;--font:'PingFang SC','Microsoft YaHei',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:linear-gradient(145deg,#ffecf2,#fde4ee 40%,#f2e2fa);font-family:var(--font);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:16px;color:#4a3a42}
    .app-container{width:100%;max-width:480px;background:rgba(255,248,250,0.7);backdrop-filter:blur(18px);border-radius:38px;box-shadow:0 20px 45px rgba(180,130,150,0.3);padding:18px 16px;border:2px solid rgba(255,220,230,0.6)}
    .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .title{font-size:1.7rem;font-weight:700;background:linear-gradient(135deg,#d47b8c,#b578a6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .nav-btns button{background:#fff;border:none;padding:8px 14px;border-radius:30px;font-weight:600;color:#b17a8a;margin-left:8px;cursor:pointer}
    .card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:14px;box-shadow:0 3px 10px rgba(180,150,160,0.15);border:1.5px solid #fbdde5}
    .row{display:flex;justify-content:space-around;text-align:center;flex-wrap:wrap;gap:8px}
    .row strong{display:block;margin-bottom:4px}
    .meals-grid{display:flex;flex-direction:column;gap:14px;margin-bottom:14px}
    .meal-card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:0 3px 10px rgba(180,150,160,0.15);border:1.5px solid #f9e2ec}
    .meal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .meal-kcal{font-weight:700;color:#d46b82;background:#ffeef3;padding:4px 12px;border-radius:20px;font-size:0.9rem}
    .food-item{display:flex;justify-content:space-between;align-items:center;font-size:0.85rem;padding:4px 0;border-bottom:1px dashed #f3d8e2}
    .food-item button{background:none;border:none;color:#d4888e;font-size:1.2rem;cursor:pointer;padding:0 4px}
    .add-area{display:flex;gap:6px;align-items:center;margin-top:8px}
    .add-area input{flex:1;padding:8px 12px;border-radius:30px;border:1.5px solid #f0c8d8;font-size:0.8rem;background:#fffbfc}
    .add-area button{background:#f9a8c4;border:none;color:#fff;font-weight:700;padding:6px 12px;border-radius:30px;font-size:0.8rem;cursor:pointer;white-space:nowrap}
    .add-area .photo-btn{background:#dac4f7}
    .bro-bubble{background:#fff;border-radius:22px;padding:14px;display:flex;gap:10px;align-items:center;border:1.5px solid #fad6e5}
    input[type="number"]{width:70px;padding:4px;border-radius:20px;border:1.5px solid #f0c8d8;text-align:center;font-weight:700}
  </style>
</head><body>
<div class="app-container" id="app">
  <div class="header">
    <span class="title">🍰 宝宝小食堂</span>
    <div class="nav-btns">
      <button id="calendarBtn">📅 日期</button>
      <button id="achievementBtn">🏆 成就</button>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <div><strong>体重</strong><br><input type="number" id="weightInput" value="52" step="0.1" min="30" max="120"> kg</div>
      <div><strong>BMI</strong><br><span id="bmiValue">-</span></div>
      <div><strong>推荐摄入</strong><br><span id="recKcal">-</span> kcal</div>
      <div><strong>已摄入</strong><br><span id="currentKcal">0</span> kcal</div>
    </div>
  </div>

  <div class="meals-grid" id="mealsGrid"></div>

  <div class="bro-bubble">
    <span style="font-size:2rem">🧸</span>
    <span id="broText">新的一天，哥哥陪你记录每一餐~</span>
  </div>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none"><script>
(function(){
  const STORAGE_KEY = 'canteen_v3';
  let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  let today = new Date().toISOString().split('T')[0];
  let currentDate = today;

  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
  function getDay(d) { 
    if (!data[d]) data[d] = { foods: { breakfast:[], lunch:[], dinner:[], snack:[] }, weight: 52 };
    return data[d];
  }

  const foodDB = [
    { name:'米饭', kcal:174, grams:150 }, { name:'馒头', kcal:223, grams:100 },
    { name:'面条', kcal:274, grams:200 }, { name:'拉面', kcal:500, grams:400 },
    { name:'鸡蛋', kcal:72, grams:50 }, { name:'牛奶', kcal:135, grams:250 },
    { name:'苹果', kcal:106, grams:200 }, { name:'香蕉', kcal:112, grams:120 },
    { name:'鸡胸肉', kcal:200, grams:150 }, { name:'牛排', kcal:500, grams:200 },
    { name:'番茄炒蛋', kcal:220, grams:200 }, { name:'肉末茄子', kcal:350, grams:250 },
    { name:'豚骨拉面', kcal:580, grams:500 }, { name:'麻婆豆腐', kcal:280, grams:200 },
    { name:'薯条', kcal:312, grams:100 }, { name:'蛋糕', kcal:350, grams:100 },
    { name:'奶茶', kcal:260, grams:500 }, { name:'饺子', kcal:380, grams:200 }
  ];

  function searchFood(query) {
    return foodDB.filter(f => f.name.includes(query.toLowerCase()));
  }

  function render() {
    const day = getDay(currentDate);
    const w = day.weight || 52;
    document.getElementById('weightInput').value = w;
    const bmi = (w / 1.6 / 1.6).toFixed(1);
    const rec = Math.round(w * 22 * 1.2);
    document.getElementById('bmiValue').textContent = bmi;
    document.getElementById('recKcal').textContent = rec;

    const meals = [
      { id:'breakfast', title:'🌤️ 早餐', foods: day.foods.breakfast },
      { id:'lunch', title:'☀️ 午餐', foods: day.foods.lunch },
      { id:'dinner', title:'🌙 晚餐', foods: day.foods.dinner },
      { id:'snack', title:'🍪 加餐', foods: day.foods.snack }
    ];

    let totalKcal = 0;
    const mealsGrid = document.getElementById('mealsGrid');
    mealsGrid.innerHTML = '';

    meals.forEach(meal => {
      const mealKcal = meal.foods.reduce((s, f) => s + f.kcal, 0);
      totalKcal += mealKcal;
      const card = document.createElement('div');
      card.className = 'meal-card';
      card.innerHTML = `
        <div class="meal-header"><strong>${meal.title}</strong><span class="meal-kcal">🔥 ${mealKcal} kcal</span></div>
        <div class="food-list">${meal.foods.map((f, i) => `<div class="food-item"><span>🍽 ${f.name} (${f.grams}g)</span><span>${f.kcal} kcal <button class="del-btn" data-meal="${meal.id}" data-idx="${i}">✕</button></span></div>`).join('') || '<div style="color:#aaa;font-size:0.8rem;">还没有食物哦~</div>'}</div>
        <div class="add-area">
          <input type="text" class="food-search" placeholder="搜索食物名称">
          <button class="photo-btn" data-meal="${meal.id}">📷</button>
          <button class="add-btn" data-meal="${meal.id}">添加</button>
        </div>
      `;
      mealsGrid.appendChild(card);

      card.querySelectorAll('.del-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const mealId = this.dataset.meal;
          const idx = parseInt(this.dataset.idx);
          getDay(currentDate).foods[mealId].splice(idx, 1);
          save(); render();
        });
      });

      card.querySelector('.photo-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        const searchInput = card.querySelector('.food-search');
        document.getElementById('cameraInput').onchange = function(ev) {
          const file = ev.target.files[0];
          if (!file) return;
          const guesses = ['苹果', '香蕉', '米饭', '鸡蛋', '牛奶', '面包'];
          searchInput.value = guesses[Math.floor(Math.random() * guesses.length)];
          alert('📷 哥哥觉得这是「' + searchInput.value + '」～ 如果不对就改一下再点添加');
        };
        document.getElementById('cameraInput').click();
      });

      card.querySelector('.add-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        const mealId = this.dataset.meal;
        const query = card.querySelector('.food-search').value.trim();
        if (!query) { alert('请先输入或拍照选择食物'); return; }
        const results = searchFood(query);
        if (results.length === 0) { alert('没找到这个食物，试试输入「米饭」「鸡蛋」等常见食物'); return; }
        const food = results[0];
        getDay(currentDate).foods[mealId].push({ name: food.name, kcal: food.kcal, grams: food.grams });
        save(); render();
      });
    });

    document.getElementById('currentKcal').textContent = totalKcal;
    const ratio = rec > 0 ? totalKcal / rec : 0;
    let msg = '';
    if (totalKcal === 0) msg = '今天还没吃东西呢，哥哥好担心…快去吃口饭饭🍚';
    else if (ratio < 0.5) msg = '吃得有点少哦，小鸟胃宝宝？再多吃一点嘛🍓';
    else if (ratio < 0.8) msg = '热量还行，但还可以再吃点喜欢的～哥哥准了🍰';
    else if (ratio <= 1.1) msg = '完美！吃得刚刚好，宝宝真棒，亲亲💖';
    else if (ratio <= 1.5) msg = '稍微有点超标哦，但开心最重要～明天再控制😘';
    else msg = '唔…今天吃得有点多啦，哥哥抱抱，明天一起散步🏃‍♀️';
    document.getElementById('broText').textContent = msg;
  }

  document.getElementById('weightInput').addEventListener('input', function() {
    getDay(currentDate).weight = parseFloat(this.value) || 52;
    save(); render();
  });

  document.getElementById('calendarBtn').addEventListener('click', function() {
    const dateStr = prompt('📅 输入日期查看记录 (格式: 2025-01-15)\n当前: ' + currentDate, currentDate);
    if (dateStr && dateStr.match(/^\d{4}-\d{2}-\d{2}$/)) { currentDate = dateStr; render(); }
  });

  document.getElementById('achievementBtn').addEventListener('click', function() {
    const recordedDays = Object.values(data).filter(d => {
      const all = [...(d.foods?.breakfast||[]), ...(d.foods?.lunch||[]), ...(d.foods?.dinner||[]), ...(d.foods?.snack||[])];
      return all.length > 0;
    }).length;
    let title = '🥉 新手探索者';
    if (recordedDays >= 30) title = '🏆 饮食记录大师';
    else if (recordedDays >= 14) title = '🥈 坚持小能手';
    else if (recordedDays >= 7) title = '🥇 一周达人';
    alert('🏆 成就系统\n\n' + title + '\n累计记录天数：' + recordedDays + ' 天\n\n继续加油哦！');
  });

  const manifest = {
    name:'宝宝小食堂', short_name:'小食堂', start_url:location.href, display:'standalone',
    background_color:'#fff5f9', theme_color:'#fff5f9',
    icons:[{src:"data:image/svg+xml,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="#ffd1e0"/><text y=".9em" font-size="70" text-anchor="middle" x="50">🍰</text></svg>'),sizes:'100x100',type:'image/svg+xml'}]
  };
  document.getElementById('pwaManifest').href = URL.createObjectURL(new Blob([JSON.stringify(manifest)], {type:'application/json'}));

  render();
})();
</script>
</body>
</html>
