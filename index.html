<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>🍰 宝宝小食堂</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="宝宝小食堂">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23ffd1e0'/><text y='.9em' font-size='70' text-anchor='middle' x='50'>🍰</text></svg>">
  <link rel="manifest" id="pwaManifest">
  <meta name="theme-color" content="#fff5f9">
  <style>
    :root{--bg:#fff5f9;--card:#fff;--pink:#ffd1e0;--rose:#f9a8c4;--shadow:0 6px 22px rgba(210,180,190,0.25);--radius:26px;--font:'PingFang SC','Microsoft YaHei',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:var(--bg);font-family:var(--font);min-height:100vh;display:flex;
      justify-content:center;align-items:flex-start;padding:16px;color:#4a3a42;
      transition:background 0.6s;position:relative;overflow-x:hidden;
    }
    .photo-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;background-size:cover;background-position:center;background-repeat:no-repeat;display:none}
    .photo-bg.active{display:block}
    .photo-bg.blur{filter:blur(8px)}
    .app-container{
      width:100%;max-width:480px;background:rgba(255,248,250,0.75);
      backdrop-filter:blur(18px);border-radius:38px;
      box-shadow:0 20px 45px rgba(180,130,150,0.3), inset 0 1px 10px rgba(255,255,255,0.7);
      padding:18px 16px;border:2px solid rgba(255,220,230,0.6);position:relative;z-index:1;
    }
    .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .title{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,#d47b8c,#b578a6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .nav-btns button{background:#fff;border:none;padding:8px 14px;border-radius:30px;font-weight:600;color:#b17a8a;margin-left:6px;cursor:pointer;font-size:0.85rem;box-shadow:0 2px 8px rgba(180,150,160,0.1)}
    .card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:14px;box-shadow:0 3px 10px rgba(180,150,160,0.15);border:2px solid #fbdde5;position:relative}
    .row{display:flex;justify-content:space-around;text-align:center;flex-wrap:wrap;gap:8px}    .page{display:none}
    .page.active{display:block}
    .bro-area{text-align:center;position:relative;padding:10px 0}
    .bro-emoji{font-size:5rem;display:inline-block;cursor:pointer;transition:transform 0.2s;user-select:none;position:relative;z-index:3}
    .bro-emoji:active{transform:scale(1.2)}
    .heart-particle{position:absolute;font-size:1.5rem;animation:floatUp 1.5s ease-out forwards;pointer-events:none;z-index:10}
    @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-100px) scale(1.8)}}
    .click-particle{position:fixed;pointer-events:none;z-index:999;animation:clickBurst 0.8s ease-out forwards}
    @keyframes clickBurst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
    .meal-card{background:var(--card);border-radius:var(--radius);padding:14px;box-shadow:0 3px 10px rgba(180,150,160,0.15);border:2px solid #f9e2ec;margin-bottom:10px}
    .meal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .meal-kcal{font-weight:700;color:#d46b82;background:#ffeef3;padding:4px 12px;border-radius:20px;font-size:0.9rem}
    .food-item{display:flex;justify-content:space-between;align-items:center;font-size:0.85rem;padding:4px 0;border-bottom:1px dashed #f3d8e2}
    .food-item button{background:none;border:none;color:#d4888e;font-size:1.2rem;cursor:pointer}
    .add-area{display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap}
    .add-area input{flex:1;min-width:100px;padding:8px 12px;border-radius:30px;border:1.5px solid #f0c8d8;font-size:0.8rem;background:#fffbfc}
    .add-area select{padding:6px 10px;border-radius:20px;border:1.5px solid #f0c8d8;font-size:0.75rem;background:#fffbfc}
    .add-area button{background:#f9a8c4;border:none;color:#fff;font-weight:700;padding:6px 12px;border-radius:30px;font-size:0.8rem;cursor:pointer;white-space:nowrap}
    .bro-bubble{background:#fff;border-radius:22px;padding:14px;display:flex;gap:10px;align-items:center;border:1.5px solid #fad6e5}
    .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;text-align:center}
    .cal-day{padding:10px 4px;border-radius:12px;cursor:pointer;font-weight:600;font-size:0.85rem;background:#fff;transition:0.2s}
    .cal-day.recorded{background:#f9a8c4;color:#fff}
    .cal-day.today{border:2px solid #d47b8c}
    .skin-card{display:inline-block;width:75px;height:75px;border-radius:20px;margin:5px;cursor:pointer;border:3px solid transparent;text-align:center;line-height:75px;font-size:0.7rem;font-weight:700;position:relative;overflow:hidden}
    .skin-card.selected{border-color:#d47b8c}
    .skin-card.locked{opacity:0.5}
    .coin-display{background:#fff;padding:6px 14px;border-radius:30px;font-weight:700;color:#d4a017;display:inline-block;margin-bottom:10px}
    .secret-btn{position:fixed;bottom:20px;right:20px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.5);border:1px dashed #f9a8c4;cursor:pointer;font-size:0.7rem;z-index:50;opacity:0.5;transition:0.3s}
    .secret-btn:active{opacity:1;background:#fff}
    .settings-btn{background:#fff;border:none;padding:6px 10px;border-radius:30px;font-weight:600;color:#b17a8a;cursor:pointer;font-size:0.85rem;box-shadow:0 2px 8px rgba(180,150,160,0.1)}
    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:center;justify-content:center}
    .modal-sheet{background:#fffef9;border-radius:28px;padding:20px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto;box-shadow:0 10px 30px rgba(0,0,0,0.2);text-align:center}
    .modal-sheet h3{margin-bottom:12px;color:#4a3a42}
    .modal-sheet select,.modal-sheet input[type="range"]{margin:6px 0;width:100%}
    .modal-sheet button{margin:6px 4px;background:#f9a8c4;border:none;color:#fff;font-weight:700;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:0.85rem}
    .modal-sheet .close-btn{background:#ddd;color:#555}
    .effect-option{display:inline-block;padding:8px 12px;margin:4px;border-radius:20px;cursor:pointer;border:2px solid transparent;font-size:0.85rem;background:#fff;transition:0.2s}
    .effect-option.selected{border-color:#f9a8c4;background:#fff0f5}
    input[type="number"]{width:60px;padding:4px;border-radius:20px;border:1.5px solid #f0c8d8;text-align:center;font-weight:700}
    .back-btn{background:none;border:none;font-size:1.5rem;cursor:pointer;padding:0 8px}
    .effect-label{font-size:0.8rem;color:#b17a8a;margin-bottom:4px;font-weight:700}
  </style>
</head><body id="mainBody">

  </div>
</div>

<button class="secret-btn" id="secretCoinBtn" title="哥哥的小金库">🐾</button><script>

    {id:'hearts',name:'💖 爱心',type:'pattern',emoji:'💖'},
    {id:'stars',name:'⭐ 星光',type:'pattern',emoji:'⭐'},

    {id:'bubbles',name:'🫧 泡泡',type:'pattern',emoji:'🫧'},
    {id:'ribbons',name:'🎀 彩带',type:'pattern',emoji:'🎀'},
    {id:'snow',name:'❄️ 雪花',type:'pattern',emoji:'❄️'},
    {id:'butterflies',name:'🦋 蝴蝶',type:'pattern',emoji:'🦋'},
    {id:'candy',name:'🍬 糖果',type:'pattern',emoji:'🍬'},
    {id:'pawprints',name:'🐾 爪印',type:'pattern',emoji:'🐾'},
    {id:'notes',name:'🎵 音符',type:'pattern',emoji:'🎵'},
    {id:'stardust',name:'🌟 星尘粒子',type:'particle',color:'#ffd700'},
    {id:'sakura',name:'🌸 樱花粒子',type:'particle',color:'#ffb7c5'},
    {id:'oceanp',name:'🌊 海洋粒子',type:'particle',color:'#4fc3f7'},

    {id:'none',name:'🚫 关闭',type:'none',emoji:''}
  ];

  // 份量预设
  const portionPresets = [
    {label:'🍜 正常份',value:1},
    {label:'🥢 半份',value:0.5},
    {label:'一大口',value:30},
    {label:'几筷子',value:15},
    {label:'一小片',value:5},
    {label:'一小撮',value:3},
  ];

  // 份量克数换算
  function getPortionGrams(standardGrams, portionValue){
    if(portionValue <= 1 && portionValue > 0) return Math.round(standardGrams * portionValue);
    return portionValue; // 已经是克数
  }

  // 小熊话语库（40+句）
  const broQuotes = [
    '今天也要好好吃饭哦~','戳戳哥哥的小熊，他会很开心~','宝宝最棒了！','记得记录每一餐呀','哥哥一直陪着你',
    '今天有好好喝水吗？','宝宝笑起来最好看了','累了就歇会儿，哥哥陪你','你记录的样子真可爱','每一餐都值得被记住',

  function randomQuote(){
    return broQuotes[Math.floor(Math.random() * broQuotes.length)];
  }

  // 食物数据库
  const baseIngredients = {
    '米饭':{kcal:116,g:150},'馒头':{kcal:223,g:100},'面条':{kcal:137,g:200},'鸡蛋':{kcal:144,g:50},

  const recipeDB = {
    '番茄炒蛋':[{i:'番茄',q:1.5},{i:'鸡蛋',q:2},{i:'食用油',q:1},{i:'白糖',q:0.5}],

    '麻婆豆腐':[{i:'豆腐',q:2},{i:'猪肉(瘦)',q:0.6},{i:'食用油',q:1}]

  function applySkin(skinId){
    const skin = skins.find(s=>s.id===skinId) || skins[0];
    document.getElementById('mainBody').style.background = skin.bg;

  function applyBgPhoto(){
    const bg = document.getElementById('photoBg');
    if(appData.bgPhoto){
      bg.style.backgroundImage = `url(${appData.bgPhoto})`;
      bg.classList.add('active');
      if(appData.photoMode === 'blur') bg.classList.add('blur');
      else bg.classList.remove('blur');

  function switchPage(pageId){

    document.getElementById('page-'+pageId).classList.add('active');
  }// ========== 主页渲染 ==========
function renderHome(){
  const todayDay = getDay(today);
  const allMeals = [...todayDay.foods.breakfast,...todayDay.foods.lunch,...todayDay.foods.dinner,...todayDay.foods.snack];
  const todayKcal = allMeals.reduce((s,f)=>s+f.kcal,0);
  document.getElementById('homeKcal').textContent = todayKcal;
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth()+1;
  let monthDays=0, streak=0;
  Object.keys(appData.days).forEach(d=>{
    if(d.startsWith(`${year}-${String(month).padStart(2,'0')}`)){
      const day = appData.days[d];
      if([...day.foods.breakfast,...day.foods.lunch,...day.foods.dinner,...day.foods.snack].length>0) monthDays++;
    }
  });
  let checkDate = new Date();
  while(true){
    const ds = checkDate.toISOString().split('T')[0];
    const day = appData.days[ds];
    if(day && [...day.foods.breakfast,...day.foods.lunch,...day.foods.dinner,...day.foods.snack].length>0) streak++;
    else break;
    checkDate.setDate(checkDate.getDate()-1);
  }
  document.getElementById('monthDays').textContent = monthDays;
  document.getElementById('streakDays').textContent = streak;
  document.getElementById('coinCount').textContent = appData.coins;
  document.getElementById('shopCoinCount').textContent = appData.coins;
  document.getElementById('homeBroText').textContent = randomQuote();
}

// ========== 日历渲染 ==========
function renderCalendar(){
  document.getElementById('calMonthLabel').textContent = `${calYear}年 ${calMonth}月`;
  const grid = document.getElementById('calendarGrid');
  const daysInMonth = new Date(calYear,calMonth,0).getDate();
  const firstDay = new Date(calYear,calMonth-1,1).getDay();
  let html = '';
  ['日','一','二','三','四','五','六'].forEach(d=>html+=`<div style="font-weight:700;color:#b17a8a">${d}</div>`);
  for(let i=0;i<firstDay;i++) html+='<div></div>';
  for(let d=1;d<=daysInMonth;d++){
    const ds = `${calYear}-${String(calMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const day = appData.days[ds];
    const recorded = day && [...day.foods.breakfast,...day.foods.lunch,...day.foods.dinner,...day.foods.snack].length>0;
    const isToday = ds===today;
    html+=`<div class="cal-day${recorded?' recorded':''}${isToday?' today':''}" data-date="${ds}">${d}</div>`;
  }
  grid.innerHTML = html;
  grid.onclick = function(e){
    const el = e.target.closest('.cal-day');
    if(!el) return;
    currentRecordDate = el.dataset.date;
    switchPage('record');
    renderRecord();
  };
}// ========== 记录页 ==========
function smartEstimate(query, portion){
  const lower = query.toLowerCase();
  const foodTypes = {'米':116,'面':137,'饭':116,'饼':250,'猪':250,'牛':200,'鸡':150,'鱼':100,'虾':90,'菜':25,'蔬':25,'菇':25,'豆':80,'茄':23,'瓜':16,'果':55,'奶':54,'蛋':144,'油':884,'糖':400};
  const cookingMethods = {'蒸':1.0,'煮':1.0,'清':1.0,'炒':1.5,'烧':1.6,'焖':1.5,'炖':1.4,'炸':2.2,'酥':2.0,'红':1.7,'酱':1.5,'卤':1.4,'烤':1.6};
  let baseKcal=150;
  for(let[k,v]of Object.entries(foodTypes)){if(lower.includes(k)){baseKcal=v;break;}}
  let m=1.4;
  for(let[k,v]of Object.entries(cookingMethods)){if(lower.includes(k)){m=v;break;}}
  const kcalPer100g=Math.round(baseKcal*m);
  const grams=200;
  return{name:query,kcal:Math.round(kcalPer100g*grams/100),grams,source:'🤖'};
}

function calculateFood(query, portionValue, standardGrams){
  const exactMatch = baseIngredients[query];
  if(exactMatch){
    const grams = getPortionGrams(exactMatch.g, portionValue);
    return{name:query,kcal:Math.round(exactMatch.kcal*grams/100),grams,source:'📊'};
  }
  const recipe = recipeDB[query];
  if(recipe){
    let tk=0,tg=0;
    recipe.forEach(item=>{
      const ing=baseIngredients[item.i];
      if(ing){const g=getPortionGrams(ing.g*item.q, portionValue);tg+=g;tk+=Math.round(ing.kcal*g/100);}
    });
    return{name:query,kcal:tk,grams:Math.round(tg),source:'🧑‍🍳'};
  }
  return smartEstimate(query, portionValue);
}

async function searchOnlineFood(query){
  try{
    const r=await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&json=1&page_size=3`);
    const d=await r.json();
    if(d.products&&d.products.length>0){
      return d.products.map(p=>{
        const kcal=p.nutriments?.['energy-kcal_100g'];if(!kcal)return null;
        const ss=p.serving_size?parseFloat(p.serving_size):100;
        return{name:p.product_name||query,kcal:Math.round(kcal*ss/100),grams:ss,source:'🌐'};
      }).filter(Boolean);
    }
  }catch(e){}
  return[];
}

function renderRecord(){
  const day = getDay(currentRecordDate);
  const w = day.weight||52;
  document.getElementById('weightInput').value = w;
  document.getElementById('recDateLabel').textContent = currentRecordDate;
  const bmi = (w/1.6/1.6).toFixed(1);
  const rec = Math.round(w*22*1.2);
  document.getElementById('bmiValue').textContent = bmi;
  document.getElementById('recKcal').textContent = rec;
  const meals = [
    {id:'breakfast',title:'🌤️ 早餐',foods:day.foods.breakfast},
    {id:'lunch',title:'☀️ 午餐',foods:day.foods.lunch},
    {id:'dinner',title:'🌙 晚餐',foods:day.foods.dinner},
    {id:'snack',title:'🍪 加餐',foods:day.foods.snack}
  ];
  let totalKcal=0;
  const grid = document.getElementById('mealsGrid');
  grid.innerHTML='';
  meals.forEach(meal=>{
    const mkcal = meal.foods.reduce((s,f)=>s+f.kcal,0);
    totalKcal+=mkcal;
    const card = document.createElement('div');
    card.className='meal-card';
    const portionOptions = portionPresets.map(p=>`<option value="${p.value}">${p.label}</option>`).join('');
    card.innerHTML=`
      <div class="meal-header"><strong>${meal.title}</strong><span class="meal-kcal">🔥 ${mkcal} kcal</span></div>
      <div>${meal.foods.map((f,i)=>`<div class="food-item"><span>🍽 ${f.name} <small>${f.source||''}</small> (${f.grams}g)</span><span>${f.kcal} kcal <button class="edit-btn" data-meal="${meal.id}" data-idx="${i}">✏️</button><button class="del-btn" data-meal="${meal.id}" data-idx="${i}">✕</button></span></div>`).join('')||'<div style="color:#aaa;font-size:0.8rem">暂无食物</div>'}</div>
      <div class="add-area">
        <input type="text" class="food-search" placeholder="搜索食物">
        <select class="portion-select">${portionOptions}</select>
        <button class="add-btn" data-meal="${meal.id}">添加</button>
      </div>`;
    grid.appendChild(card);
    card.querySelectorAll('.del-btn').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();getDay(currentRecordDate).foods[this.dataset.meal].splice(parseInt(this.dataset.idx),1);save();renderRecord();});});
    card.querySelectorAll('.edit-btn').forEach(b=>{b.addEventListener('click',function(e){e.stopPropagation();const idx=parseInt(this.dataset.idx);const food=getDay(currentRecordDate).foods[this.dataset.meal][idx];const newKcal=prompt('修改热量 (千卡)',food.kcal);if(newKcal){food.kcal=parseInt(newKcal);food.source='✏️';save();renderRecord();}});});
    card.querySelector('.add-btn').addEventListener('click', async function(e){
      e.stopPropagation();
      const query = card.querySelector('.food-search').value.trim();
      if(!query){alert('请输入食物名称');return;}
      const portionValue = parseFloat(card.querySelector('.portion-select').value);
      const localResult = calculateFood(query, portionValue, 200);
      const onlineResults = await searchOnlineFood(query);
      if(onlineResults.length>0){
        const of=onlineResults[0];
        const grams = getPortionGrams(of.grams, portionValue);
        getDay(currentRecordDate).foods[this.dataset.meal].push({name:of.name,kcal:Math.round(of.kcal*(grams/of.grams)),grams,source:of.source});
      }else{
        getDay(currentRecordDate).foods[this.dataset.meal].push({name:localResult.name,kcal:localResult.kcal,grams:localResult.grams,source:localResult.source});
      }
      if(!getDay(currentRecordDate).checkedIn){getDay(currentRecordDate).checkedIn=true;appData.coins+=5;}
      save();renderRecord();
    });
  });
  document.getElementById('currentKcal').textContent = totalKcal;
}// ========== 皮肤商店 ==========
function renderShop(){
  document.getElementById('shopCoinCount').textContent = appData.coins;
  const list = document.getElementById('skinList');
  list.innerHTML = skins.map(s=>{
    const owned=appData.skins.owned.includes(s.id);
    const active=appData.skins.active===s.id;
    return`<div class="skin-card${active?' selected':''}${!owned?' locked':''}" style="background:${s.bg}" data-id="${s.id}"><div>${s.emoji}</div><div style="font-size:0.65rem">${s.name}</div><div style="font-size:0.6rem">${owned?(active?'使用中':'已拥有'):'🪙'+s.price}</div></div>`;
  }).join('');
  list.onclick=function(e){
    const el=e.target.closest('.skin-card');if(!el)return;
    const id=el.dataset.id;const skin=skins.find(s=>s.id===id);if(!skin)return;
    if(!appData.skins.owned.includes(id)){
      if(appData.coins>=skin.price){appData.coins-=skin.price;appData.skins.owned.push(id);save();applySkin(id);renderShop();document.getElementById('shopBroText').textContent='皮肤已兑换！好漂亮~';}
      else{document.getElementById('shopBroText').textContent='金币不够哦，每天打卡可以赚金币~';}
    }else{applySkin(id);renderShop();document.getElementById('shopBroText').textContent='皮肤已切换！';}
  };
}

// ========== 点击特效 ==========
document.addEventListener('click',function(e){
  if(e.target.closest('button')||e.target.closest('input')||e.target.closest('select')||e.target.closest('.modal-overlay')) return;
  if(appData.clickEffect === 'none') return;
  const eff = effects.find(ef=>ef.id===appData.clickEffect);
  if(!eff) return;
  const count = eff.type==='pattern' ? 8 : 12;
  for(let i=0;i<count;i++){
    const particle=document.createElement('div');
    particle.className='click-particle';
    const angle=(Math.PI*2*i)/count;
    const distance=30+Math.random()*60;
    particle.style.cssText=`
      left:${e.clientX}px;top:${e.clientY}px;
      font-size:${14+Math.random()*16}px;
      --dx:${Math.cos(angle)*distance}px;--dy:${Math.sin(angle)*distance}px;
      ${eff.type==='pattern'?'' : `width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;background:${eff.color==='random'?`hsl(${Math.random()*360},80%,60%)`:eff.color};border-radius:50%`}
    `;
    if(eff.type==='pattern') particle.textContent = eff.emoji;
    document.body.appendChild(particle);
    setTimeout(()=>particle.remove(),800);
  }
});
